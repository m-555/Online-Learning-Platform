services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aula}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aula}
      POSTGRES_DB: ${POSTGRES_DB:-aula}
    volumes:
      - aula_pgdata:/var/lib/postgresql/data
    ports:
      # Host 5433 avoids clashing with a Postgres already running on 5432.
      # Containers still reach the database internally on 5432 via the "db" hostname.
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aula}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-aula}:${POSTGRES_PASSWORD:-aula}@db:5432/${POSTGRES_DB:-aula}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      CORS_ORIGINS: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test:
        ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        # Browser-facing API URL (inlined at build time).
        NEXT_PUBLIC_API_URL: http://localhost:8000/api
    environment:
      # Server-side rendering reaches the backend over the compose network.
      INTERNAL_API_URL: http://backend:8000/api
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  aula_pgdata:
